name: Weekly Stock Newspaper Post

on:
  schedule:
    - cron: '0 9 * * 0'  # 毎週日曜 09:00 UTC = 18:00 JST
  workflow_dispatch:      # GitHub UI から手動実行も可能

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-newspaper/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r ai-newspaper/backend/requirements.txt

      - name: Install Playwright & Chromium
        run: playwright install chromium --with-deps

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Generate newspaper & post to X
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          X_API_KEY:       ${{ secrets.X_API_KEY }}
          X_API_SECRET:    ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:  ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python ai-newspaper/backend/generate_and_post.py

      - name: Upload PNG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: newspaper-png
          path: ai-newspaper/backend/data/newspaper_*.png
          retention-days: 30
